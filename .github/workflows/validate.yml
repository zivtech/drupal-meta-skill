name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f .claude/skills/drupal-critic/SKILL.md
          test -f .claude/skills/drupal-critic/references/external-skills-manifest.yaml
          test -f .claude/skills/drupal-planner/SKILL.md
          test -f .claude/skills/drupal-config-executor/SKILL.md

      - name: Verify external skill policy
        run: python scripts/verify_no_copied_skills.py

      - name: Check manifest freshness
        run: python scripts/refresh_external_skills.py --check
